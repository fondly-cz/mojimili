services:
  mojimili-laravel:
    restart: always
    ports:
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
      - 80:80

  mojimili-mariadb:
    restart: always

  adminer:
    restart: always
    image: adminer:latest
    ports:
      - 8080:8080
    environment:
      ADMINER_DEFAULT_SERVER: mojimili-mariadb
